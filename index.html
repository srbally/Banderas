const TIMER_MAX = 5;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getPoints(elapsed) {
  if (elapsed <= 1) return 5;
  if (elapsed <= 2) return 4;
  if (elapsed <= 3) return 3;
  if (elapsed <= 4) return 2;
  return 1;
}

function buildRound(pool, idx) {
  const correct = pool[idx];
  const others = shuffle(pool.filter((_, i) => i !== idx));
  return { correct, options: shuffle([correct, others[0], others[1]]) };
}

const bg = "#060e1c", surface = "#0d1f36", accent = "#22d3ee", gold = "#f59e0b", red = "#ef4444", green = "#22c55e";

const RANKING_KEY = "flagrush-ranking";

function loadRanking() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    const list = raw ? JSON.parse(raw) : [];
    return Array.isArray(list) ? list : [];
  } catch {
    return [];
  }
}

function addScoreToRanking(score) {
  const list = loadRanking();
  const entry = { id: `${Date.now()}-${Math.random().toString(36).slice(2)}`, score, ts: Date.now() };
  list.push(entry);
  list.sort((a, b) => b.score - a.score);
  try { localStorage.setItem(RANKING_KEY, JSON.stringify(list)); } catch {}
  return { list, entry };
}

function RankingPanel({ list, currentEntryId }) {
  const e = React.createElement;
  if (list.length === 0) {
    return e('div', { style: { color: "#475569", fontSize: 13, textAlign: "center" } }, "Todavía no hay partidas registradas.");
  }
  const top10 = list.slice(0, 10);
  const currentIndex = currentEntryId ? list.findIndex(en => en.id === currentEntryId) : -1;
  const currentPosition = currentIndex >= 0 ? currentIndex + 1 : null;
  const showBelow = currentPosition && currentPosition > 10;
  const row = (en, position) => e('div', {
    key: en.id,
    style: {
      display: "flex", alignItems: "center", gap: 10, padding: "6px 0",
      borderBottom: "1px solid #1e3a5f", fontSize: 14,
      color: en.id === currentEntryId ? accent : "#94a3b8",
      fontWeight: en.id === currentEntryId ? 800 : 400
    }
  },
    e('span', { style: { minWidth: 26, color: position <= 3 ? gold : "#475569", fontWeight: 700 } }, `#${position}`),
    e('span', { style: { flex: 1 } }, `${en.score} pts`),
    e('span', { style: { fontSize: 11, color: "#475569" } }, new Date(en.ts).toLocaleDateString())
  );
  return e('div', null,
    ...top10.map((en, i) => row(en, i + 1)),
    showBelow && e('div', {
      style: {
        display: "flex", alignItems: "center", gap: 10, padding: "8px 0 2px", marginTop: 4,
        borderTop: "1px dashed #1e3a5f", fontSize: 14, color: accent, fontWeight: 800
      }
    },
      e('span', { style: { minWidth: 26 } }, `#${currentPosition}`),
      e('span', { style: { flex: 1 } }, `${list[currentIndex].score} pts`),
      e('span', { style: { fontSize: 11 } }, "tú")
    )
  );
}

function TimerArc({ timeLeft }) {
  const pct = timeLeft / TIMER_MAX;
  const r = 26, circ = 2 * Math.PI * r;
  const color = pct > 0.6 ? accent : pct > 0.3 ? gold : red;
  return React.createElement('svg', { width: 68, height: 68, viewBox: "0 0 68 68" },
    React.createElement('circle', { cx: 34, cy: 34, r, fill: "none", stroke: "#1e293b", strokeWidth: 5 }),
    React.createElement('circle', { cx: 34, cy: 34, r, fill: "none", stroke: color, strokeWidth: 5,
      strokeDasharray: `${circ * pct} ${circ}`, strokeLinecap: "round",
      transform: "rotate(-90 34 34)", style: { transition: "stroke-dasharray 0.08s linear, stroke 0.3s" }
    }),
    React.createElement('text', { x: 34, y: 39, textAnchor: "middle", fill: color, fontSize: 17, fontWeight: "bold", fontFamily: "monospace" },
      Math.ceil(timeLeft)
    )
  );
}

function FlagGame() {
  const [phase, setPhase] = useState("start");
  const [pool, setPool] = useState([]);
  const [qIndex, setQIndex] = useState(0);
  const [round, setRound] = useState(null);
  const [score, setScore] = useState(0);
  const [question, setQuestion] = useState(1);
  const [timeLeft, setTimeLeft] = useState(TIMER_MAX);
  const [selected, setSelected] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [pointsEarned, setPointsEarned] = useState(0);
  const [history, setHistory] = useState([]);
  const [ranking, setRanking] = useState(() => loadRanking());
  const [lastEntryId, setLastEntryId] = useState(null);
  const timerRef = useRef(null);
  const startTimeRef = useRef(null);
  const lockedRef = useRef(false);
  const pendingRef = useRef(null);
  const readyRef = useRef(null);

  useEffect(() => {
    if (phase !== "gameover") return;
    const { list, entry } = addScoreToRanking(score);
    setRanking(list);
    setLastEntryId(entry.id);
  }, [phase]);

  const goToNextQuestion = (newPool, newQIndex, newScore, newQuestion, newHistory) => {
    if (newQIndex >= newPool.length) {
      setScore(newScore);
      setHistory(newHistory);
      setPhase("gameover");
      return;
    }
    pendingRef.current = { newPool, newQIndex, newScore, newQuestion, newHistory };
    setScore(newScore);
    setHistory(newHistory);
    setSelected(null);
    setFeedback(null);
    setPhase("ready");
  };

  useEffect(() => {
    if (phase !== "ready") { clearTimeout(readyRef.current); return; }
    readyRef.current = setTimeout(() => {
      const { newPool, newQIndex, newScore, newQuestion, newHistory } = pendingRef.current;
      setQIndex(newQIndex);
      setQuestion(newQuestion);
      setRound(buildRound(newPool, newQIndex));
      setScore(newScore);
      setHistory(newHistory);
      lockedRef.current = false;
      setTimeLeft(TIMER_MAX);
      setPhase("playing");
    }, 1000);
    return () => clearTimeout(readyRef.current);
  }, [phase]);

  const startGame = () => {
    const shuffled = shuffle(COUNTRIES);
    setPool(shuffled);
    setScore(0); setQuestion(1); setQIndex(0); setHistory([]);
    setRound(buildRound(shuffled, 0));
    setSelected(null); setFeedback(null); setLastEntryId(null);
    lockedRef.current = false;
    setPhase("playing");
  };

  useEffect(() => {
    if (phase !== "playing") { clearInterval(timerRef.current); return; }
    lockedRef.current = false;
    startTimeRef.current = Date.now();
    setTimeLeft(TIMER_MAX);
    timerRef.current = setInterval(() => {
      const elapsed = (Date.now() - startTimeRef.current) / 1000;
      const remaining = Math.max(0, TIMER_MAX - elapsed);
      setTimeLeft(remaining);
      if (remaining <= 0 && !lockedRef.current) {
        lockedRef.current = true;
        clearInterval(timerRef.current);
        setFeedback("timeout");
        setHistory(h => [...h, { name: round.correct.name, emoji: round.correct.emoji, result: "✗", pts: 0 }]);
        setTimeout(() => setPhase("gameover"), 1000);
      }
    }, 50);
    return () => clearInterval(timerRef.current);
  }, [phase, qIndex]);

  const handleSelect = (idx) => {
    if (lockedRef.current || feedback) return;
    lockedRef.current = true;
    clearInterval(timerRef.current);
    const elapsed = (Date.now() - startTimeRef.current) / 1000;
    const isCorrect = round.options[idx].code === round.correct.code;
    setSelected(idx);
    if (isCorrect) {
      const pts = getPoints(elapsed);
      const newScore = score + pts;
      const newHistory = [...history, { name: round.correct.name, emoji: round.correct.emoji, result: "✓", pts }];
      setPointsEarned(pts);
      setFeedback("correct");
      setTimeout(() => goToNextQuestion(pool, qIndex + 1, newScore, question + 1, newHistory), 700);
    } else {
      const newHistory = [...history, { name: round.correct.name, emoji: round.correct.emoji, result: "✗", pts: 0 }];
      setHistory(newHistory);
      setFeedback("wrong");
      setTimeout(() => setPhase("gameover"), 900);
    }
  };

  const e = React.createElement;
  const font = "'Segoe UI', system-ui, sans-serif";
  const center = { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" };

  if (phase === "start") return e('div', { style: { ...center, background: bg, minHeight: "100dvh", fontFamily: font, padding: "24px" } },
    e('div', { style: { fontSize: 72, marginBottom: 12, lineHeight: 1 } }, "🌍"),
    e('h1', { style: { color: accent, fontSize: 34, fontWeight: 900, letterSpacing: "-1px", marginBottom: 6, textAlign: "center" } }, "FLAG RUSH"),
    e('p', { style: { color: "#475569", fontSize: 13, marginBottom: 32, textAlign: "center" } }, `${COUNTRIES.length} países · 3 banderas · 5 segundos`),
    e('div', { style: { background: surface, borderRadius: 16, padding: "18px 26px", marginBottom: 32, width: "100%", maxWidth: 300 } },
      ...[["⚡ 1 seg","5 pts"],["🔥 2 seg","4 pts"],["✅ 3 seg","3 pts"],["⏳ 4 seg","2 pts"],["🐢 5 seg","1 pt"]].map(([l,p]) =>
        e('div', { key: l, style: { display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #1e3a5f", color: "#64748b", fontSize: 14 } },
          e('span', null, l), e('span', { style: { color: gold, fontWeight: 700 } }, p)
        )
      ),
      e('div', { style: { marginTop: 10, color: red, fontSize: 12, textAlign: "center" } }, "❌ Error o tiempo = Game Over")
    ),
    e('button', { onClick: startGame, style: { background: accent, color: "#060e1c", border: "none", borderRadius: 12, padding: "14px 52px", fontSize: 18, fontWeight: 900, cursor: "pointer", marginBottom: 14 } }, "JUGAR"),
    e('button', { onClick: () => setPhase("ranking"), style: { background: "none", color: accent, border: `1px solid ${accent}`, borderRadius: 12, padding: "10px 36px", fontSize: 14, fontWeight: 800, cursor: "pointer" } }, "VER RANKING")
  );

  if (phase === "ranking") return e('div', { style: { ...center, background: bg, minHeight: "100dvh", fontFamily: font, padding: "24px" } },
    e('div', { style: { fontSize: 48, marginBottom: 6 } }, "🏆"),
    e('h2', { style: { color: "#f1f5f9", fontSize: 22, fontWeight: 800, marginBottom: 18 } }, "Ranking"),
    e('div', { style: { background: surface, borderRadius: 12, padding: "10px 18px", width: "100%", maxWidth: 320, maxHeight: 320, overflowY: "auto", marginBottom: 24 } },
      e(RankingPanel, { list: ranking, currentEntryId: null })
    ),
    e('button', { onClick: () => setPhase("start"), style: { background: accent, color: "#060e1c", border: "none", borderRadius: 12, padding: "13px 44px", fontSize: 16, fontWeight: 900, cursor: "pointer" } }, "VOLVER")
  );

  if (phase === "ready") return e('div', { style: { ...center, background: bg, minHeight: "100dvh", fontFamily: font } },
    e('div', { style: { color: green, fontSize: 80, fontWeight: 900, lineHeight: 1 } }, "✓"),
    e('div', { style: { color: accent, fontSize: 26, fontWeight: 800, marginTop: 14 } }, `+${pointsEarned} pts`),
    e('div', { style: { color: "#334155", fontSize: 14, marginTop: 10 } }, "siguiente en un momento…")
  );

  if (phase === "gameover") {
    const rank = score >= 150 ? "🏆 Leyenda" : score >= 80 ? "🥇 Experto" : score >= 40 ? "🥈 Viajero" : "🥉 Principiante";
    return e('div', { style: { ...center, background: bg, minHeight: "100dvh", fontFamily: font, padding: "24px" } },
      e('div', { style: { fontSize: 56, marginBottom: 6 } }, rank.split(" ")[0]),
      e('h2', { style: { color: "#f1f5f9", fontSize: 24, fontWeight: 800, marginBottom: 4 } }, "Game Over"),
      e('div', { style: { color: gold, fontSize: 52, fontWeight: 900, lineHeight: 1, marginBottom: 4 } }, score),
      e('div', { style: { color: "#475569", fontSize: 13, marginBottom: 10 } }, `${rank.split(" ").slice(1).join(" ")} · ${history.filter(h => h.result === "✓").length} acertadas`),
      round && feedback !== "correct" && e('div', { style: { color: "#64748b", fontSize: 13, marginBottom: 20, textAlign: "center" } },
        "Era ", e('strong', { style: { color: "#f1f5f9" } }, round.correct.name), " ", round.correct.emoji
      ),
      e('div', { style: { background: surface, borderRadius: 12, padding: "10px 18px", width: "100%", maxWidth: 320, maxHeight: 220, overflowY: "auto", marginBottom: 16 } },
        e('div', { style: { color: "#475569", fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 6, textAlign: "center" } }, "Ranking"),
        e(RankingPanel, { list: ranking, currentEntryId: lastEntryId })
      ),
      history.length > 0 && e('div', { style: { background: surface, borderRadius: 12, padding: "10px 18px", width: "100%", maxWidth: 320, maxHeight: 200, overflowY: "auto", marginBottom: 24 } },
        ...[...history].reverse().map((h, i) =>
          e('div', { key: i, style: { display: "flex", alignItems: "center", gap: 8, padding: "4px 0", borderBottom: "1px solid #1e3a5f", fontSize: 13 } },
            e('span', { style: { fontSize: 18 } }, h.emoji),
            e('span', { style: { color: "#94a3b8", flex: 1, fontSize: 12 } }, h.name),
            e('span', { style: { color: h.result === "✓" ? green : red, fontWeight: 700 } }, h.result),
            e('span', { style: { color: gold, fontWeight: 700, minWidth: 28, textAlign: "right", fontSize: 12 } }, h.pts > 0 ? `+${h.pts}` : "")
          )
        )
      ),
      e('button', { onClick: startGame, style: { background: accent, color: "#060e1c", border: "none", borderRadius: 12, padding: "13px 44px", fontSize: 16, fontWeight: 900, cursor: "pointer" } }, "VOLVER A JUGAR")
    );
  }

  if (!round) return null;

  const flashBg = feedback === "correct" ? "rgba(34,197,94,0.12)" : feedback ? "rgba(239,68,68,0.12)" : bg;

  return e('div', { style: { background: flashBg, minHeight: "100dvh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between", fontFamily: font, padding: "env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 28px)", userSelect: "none", transition: "background 0.2s" } },
    // Header
    e('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", maxWidth: 400, paddingTop: 8 } },
      e('div', null,
        e('div', { style: { color: "#334155", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase" } }, "Pregunta"),
        e('div', { style: { color: "#f1f5f9", fontSize: 22, fontWeight: 900 } }, `#${question}`)
      ),
      e(TimerArc, { timeLeft }),
      e('div', { style: { textAlign: "right" } },
        e('div', { style: { color: "#334155", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase" } }, "Puntos"),
        e('div', { style: { color: gold, fontSize: 22, fontWeight: 900 } }, score)
      )
    ),
    // Country name
    e('div', { style: { textAlign: "center", padding: "0 16px" } },
      e('div', { style: { color: "#475569", fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 6 } }, "¿Cuál es la bandera de…?"),
      e('div', { style: { color: "#f1f5f9", fontSize: 38, fontWeight: 900, letterSpacing: "-0.5px", lineHeight: 1.2 } }, round.correct.name)
    ),
    // Feedback pill
    e('div', { style: { height: 36, display: "flex", alignItems: "center", justifyContent: "center" } },
      feedback === "correct" && e('div', { style: { background: "#14532d", color: green, borderRadius: 20, padding: "6px 20px", fontSize: 16, fontWeight: 800 } }, `+${pointsEarned} pts ✓`),
      feedback === "wrong" && e('div', { style: { background: "#7f1d1d", color: red, borderRadius: 20, padding: "6px 20px", fontSize: 16, fontWeight: 800 } }, "✗ Incorrecto"),
      feedback === "timeout" && e('div', { style: { background: "#1e1b4b", color: "#818cf8", borderRadius: 20, padding: "6px 20px", fontSize: 16, fontWeight: 800 } }, "⏱ Tiempo agotado")
    ),
    // Flags
    e('div', { style: { display: "flex", flexDirection: "column", gap: 8, alignItems: "center", width: "100%" } },
      ...round.options.map((opt, idx) => {
        const isSelected = idx === selected;
        const isCorrectOpt = opt.code === round.correct.code;
        let ring = "none";
        if (feedback && isCorrectOpt) ring = `0 0 0 5px ${green}`;
        else if (feedback && isSelected && !isCorrectOpt) ring = `0 0 0 5px ${red}`;
        return e('button', {
          key: opt.code,
          onClick: () => handleSelect(idx),
          style: { background: "none", border: "none", padding: "4px 0", cursor: feedback ? "default" : "pointer", borderRadius: 16, boxShadow: ring, transition: "box-shadow 0.15s, transform 0.1s", transform: isSelected && feedback ? "scale(1.06)" : "scale(1)", outline: "none", lineHeight: 1, fontSize: "clamp(96px, 28vw, 140px)" }
        }, opt.emoji);
      })
    ),
    e('div', { style: { height: 8 } })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(FlagGame));

// Service Worker para offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
