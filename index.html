const TIMER_MAX = 5;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getPoints(elapsed) {
  if (elapsed <= 1) return 5;
  if (elapsed <= 2) return 4;
  if (elapsed <= 3) return 3;
  if (elapsed <= 4) return 2;
  return 1;
}

function buildRound(pool, idx) {
  const correct = pool[idx];
  const others = shuffle(pool.filter((_, i) => i !== idx));
  return { correct, options: shuffle([correct, others[0], others[1]]) };
}

const FONT = "'Segoe UI', system-ui, sans-serif";
const LABEL = { fontSize: 13, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" };

  dark: {
    bg: "#060e1c", surface: "#0d1f36", text: "#f1f5f9", dim: "#94a3b8", faint: "#475569",
    border: "#1e3a5f", accent: "#22d3ee", accentText: "#060e1c", gold: "#f59e0b", red: "#ef4444", green: "#22c55e"
  },
  light: {

    border: "#cbd5e1", accent: "#0891b2", accentText: "#ffffff", gold: "#b45309", red: "#dc2626", green: "#15803d"
  }
};

const THEME_KEY = "flagrush-theme";

function loadTheme() {
  try {
    return localStorage.getItem(THEME_KEY) === "light" ? "light" : "dark";
  } catch {
    return "dark";
  }
}

function saveTheme(mode) {
  try { localStorage.setItem(THEME_KEY, mode); } catch {}
}

const RANKING_KEY = "flagrush-ranking";

function loadRanking() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    const list = raw ? JSON.parse(raw) : [];
    return Array.isArray(list) ? list : [];
  } catch {
    return [];
  }
}

const NAME_KEY = "flagrush-name";

function loadPlayerName() {
  try {
    return localStorage.getItem(NAME_KEY) || "";
  } catch {
    return "";
  }
}

function savePlayerName(name) {
  try { localStorage.setItem(NAME_KEY, name); } catch {}
}

function addScoreToRanking(score, name) {
  const list = loadRanking();
  const entry = { id: `${Date.now()}-${Math.random().toString(36).slice(2)}`, score, name: (name || "").trim() || "Anónimo", ts: Date.now() };
  list.push(entry);
  list.sort((a, b) => b.score - a.score);
  try { localStorage.setItem(RANKING_KEY, JSON.stringify(list)); } catch {}
  return { list, entry };
}

const RANKING_API = '/api/ranking';

async function fetchRanking() {
  try {
    const res = await fetch(RANKING_API);
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();
    if (!Array.isArray(data.list)) throw new Error('bad payload');
    return { list: data.list, online: true };
  } catch {
    return { list: loadRanking(), online: false };
  }
}

async function submitScore(score, name) {
  try {
    const res = await fetch(RANKING_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ score, name })
    });
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();
    if (!data.entry) throw new Error('bad payload');
    return { entry: data.entry, online: true };
  } catch {
    const { entry } = addScoreToRanking(score, name);
    return { entry, online: false };
  }
}

function RankingPanel({ list, currentEntryId, theme }) {
  const e = React.createElement;
  if (list.length === 0) {
    return e('div', { style: { color: theme.faint, fontSize: 15, textAlign: "center", fontFamily: FONT } }, "Todavía no hay partidas registradas.");
  }
  const top10 = list.slice(0, 10);
  const currentIndex = currentEntryId ? list.findIndex(en => en.id === currentEntryId) : -1;
  const currentPosition = currentIndex >= 0 ? currentIndex + 1 : null;
  const showBelow = currentPosition && currentPosition > 10;
  const row = (en, position) => e('div', {
    key: en.id,
    style: {
      display: "flex", alignItems: "center", gap: 10, padding: "8px 0",
      borderBottom: `1px solid ${theme.border}`, fontSize: 16, fontFamily: FONT,
      color: en.id === currentEntryId ? theme.accent : theme.dim,
      fontWeight: en.id === currentEntryId ? 800 : 400
    }
  },
    e('span', { style: { minWidth: 30, color: position <= 3 ? theme.gold : theme.faint, fontWeight: 700 } }, `#${position}`),
    e('span', { style: { flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, en.name || "Anónimo"),
    e('span', { style: { fontWeight: 700 } }, `${en.score} pts`)
  );
  return e('div', null,
    ...top10.map((en, i) => row(en, i + 1)),
    showBelow && e('div', {
      style: {
        display: "flex", alignItems: "center", gap: 10, padding: "10px 0 2px", marginTop: 4, fontFamily: FONT,
        borderTop: `1px dashed ${theme.border}`, fontSize: 16, color: theme.accent, fontWeight: 800
      }
    },
      e('span', { style: { minWidth: 30 } }, `#${currentPosition}`),
      e('span', { style: { flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, list[currentIndex].name || "Anónimo"),
      e('span', { style: { fontWeight: 700 } }, `${list[currentIndex].score} pts`)
    )
  );
}

function TimerArc({ timeLeft, theme }) {
  const pct = timeLeft / TIMER_MAX;
  const r = 26, circ = 2 * Math.PI * r;
  const color = pct > 0.6 ? theme.accent : pct > 0.3 ? theme.gold : theme.red;
  return React.createElement('svg', { width: 68, height: 68, viewBox: "0 0 68 68" },
    React.createElement('circle', { cx: 34, cy: 34, r, fill: "none", stroke: theme.border, strokeWidth: 5 }),
    React.createElement('circle', { cx: 34, cy: 34, r, fill: "none", stroke: color, strokeWidth: 5,
      strokeDasharray: `${circ * pct} ${circ}`, strokeLinecap: "round",
      transform: "rotate(-90 34 34)", style: { transition: "stroke-dasharray 0.08s linear, stroke 0.3s" }
    }),
    React.createElement('text', { x: 34, y: 39, textAnchor: "middle", fill: color, fontSize: 17, fontWeight: "bold", fontFamily: "monospace" },
      Math.ceil(timeLeft)
    )
  );
}

function ThemeToggle({ themeMode, onToggle, theme }) {
  const e = React.createElement;
  const isLight = themeMode === "light";
  return e('div', {

    style: { marginTop: 22, display: "flex", alignItems: "center", gap: 10, cursor: "pointer", userSelect: "none" }
  },
    e('span', { style: { fontSize: 15 } }, "🌙"),
    e('div', { style: { width: 46, height: 26, borderRadius: 13, background: theme.border, position: "relative", transition: "background 0.2s" } },
      e('div', { style: { width: 20, height: 20, borderRadius: "50%", background: theme.accent, position: "absolute", top: 3, left: isLight ? 23 : 3, transition: "left 0.2s" } })
    ),
    e('span', { style: { fontSize: 15 } }, "☀️")
  );
}

function FlagGame() {
  const [phase, setPhase] = useState("start");
  const [pool, setPool] = useState([]);
  const [qIndex, setQIndex] = useState(0);
  const [round, setRound] = useState(null);
  const [score, setScore] = useState(0);
  const [question, setQuestion] = useState(1);
  const [timeLeft, setTimeLeft] = useState(TIMER_MAX);
  const [selected, setSelected] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [pointsEarned, setPointsEarned] = useState(0);
  const [history, setHistory] = useState([]);
  const [ranking, setRanking] = useState(() => loadRanking());
  const [lastEntryId, setLastEntryId] = useState(null);
  const [updating, setUpdating] = useState(false);
  const [playerName, setPlayerName] = useState(() => loadPlayerName());
  const [themeMode, setThemeMode] = useState(() => loadTheme());
  const theme = THEMES[themeMode];
  const toggleTheme = () => setThemeMode(m => {
    const next = m === "light" ? "dark" : "light";
    saveTheme(next);
    return next;
  });
  const timerRef = useRef(null);
  const startTimeRef = useRef(null);
  const lockedRef = useRef(false);
  const pendingRef = useRef(null);
  const readyRef = useRef(null);

  useEffect(() => {
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', theme.bg);
    document.body.style.background = theme.bg;
  }, [themeMode]);

  useEffect(() => {
    fetchRanking().then(({ list }) => setRanking(list));
  }, []);

  useEffect(() => {
    if (phase !== "ranking") return;
    fetchRanking().then(({ list }) => setRanking(list));
  }, [phase]);

  useEffect(() => {
    if (phase !== "gameover") return;
    let cancelled = false;
    (async () => {
      const { entry } = await submitScore(score, playerName);
      if (cancelled) return;
      setLastEntryId(entry.id);
      const { list } = await fetchRanking();
      if (cancelled) return;
      setRanking(list);
    })();
    return () => { cancelled = true; };
  }, [phase]);

  const goToNextQuestion = (newPool, newQIndex, newScore, newQuestion, newHistory) => {
    if (newQIndex >= newPool.length) {
      setScore(newScore);
      setHistory(newHistory);
      setPhase("gameover");
      return;
    }
    pendingRef.current = { newPool, newQIndex, newScore, newQuestion, newHistory };
    setScore(newScore);
    setHistory(newHistory);
    setSelected(null);
    setFeedback(null);
    setPhase("ready");
  };

  useEffect(() => {
    if (phase !== "ready") { clearTimeout(readyRef.current); return; }
    readyRef.current = setTimeout(() => {
      const { newPool, newQIndex, newScore, newQuestion, newHistory } = pendingRef.current;
      setQIndex(newQIndex);
      setQuestion(newQuestion);
      setRound(buildRound(newPool, newQIndex));
      setScore(newScore);
      setHistory(newHistory);
      lockedRef.current = false;
      setTimeLeft(TIMER_MAX);
      setPhase("playing");
    }, 1000);
    return () => clearTimeout(readyRef.current);
  }, [phase]);

  const startGame = () => {
    const shuffled = shuffle(COUNTRIES);
    setPool(shuffled);
    setScore(0); setQuestion(1); setQIndex(0); setHistory([]);
    setRound(buildRound(shuffled, 0));
    setSelected(null); setFeedback(null); setLastEntryId(null);
    lockedRef.current = false;
    setPhase("playing");
  };

  useEffect(() => {
    if (phase !== "playing") { clearInterval(timerRef.current); return; }
    lockedRef.current = false;
    startTimeRef.current = Date.now();
    setTimeLeft(TIMER_MAX);
    timerRef.current = setInterval(() => {
      const elapsed = (Date.now() - startTimeRef.current) / 1000;
      const remaining = Math.max(0, TIMER_MAX - elapsed);
      setTimeLeft(remaining);
      if (remaining <= 0 && !lockedRef.current) {
        lockedRef.current = true;
        clearInterval(timerRef.current);
        setFeedback("timeout");
        setHistory(h => [...h, { name: round.correct.name, code: round.correct.code, result: "✗", pts: 0 }]);
        setTimeout(() => setPhase("gameover"), 1000);
      }
    }, 50);
    return () => clearInterval(timerRef.current);
  }, [phase, qIndex]);

  const handleSelect = (idx) => {
    if (lockedRef.current || feedback) return;
    lockedRef.current = true;
    clearInterval(timerRef.current);
    const elapsed = (Date.now() - startTimeRef.current) / 1000;
    const isCorrect = round.options[idx].code === round.correct.code;
    setSelected(idx);
    if (isCorrect) {
      const pts = getPoints(elapsed);
      const newScore = score + pts;
      const newHistory = [...history, { name: round.correct.name, code: round.correct.code, result: "✓", pts }];
      setPointsEarned(pts);
      setFeedback("correct");
      setTimeout(() => goToNextQuestion(pool, qIndex + 1, newScore, question + 1, newHistory), 700);
    } else {
      const newHistory = [...history, { name: round.correct.name, code: round.correct.code, result: "✗", pts: 0 }];
      setHistory(newHistory);
      setFeedback("wrong");
      setTimeout(() => setPhase("gameover"), 900);
    }
  };

  const handleUpdate = async () => {
    setUpdating(true);
    try {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } finally {
      location.href = location.pathname + '?t=' + Date.now();
    }
  };

  const e = React.createElement;
  const center = { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" };
  const rowBtn = { background: theme.accent, color: theme.accentText, border: "none", borderRadius: 12, padding: "16px 0", fontSize: 17, fontWeight: 900, cursor: "pointer", flex: 1, fontFamily: FONT };

  if (phase === "start") return e('div', { style: { ...center, background: theme.bg, minHeight: "100dvh", fontFamily: FONT, padding: "24px" } },
    e('button', {
      onClick: handleUpdate,
      disabled: updating,
      title: "Buscar la última versión",
      style: {
        position: "fixed", top: "calc(env(safe-area-inset-top, 0px) + 56px)", right: 14, background: "none", border: `1px solid ${theme.border}`,
        color: theme.dim, borderRadius: 10, padding: "7px 12px", fontSize: 12, fontWeight: 700, fontFamily: FONT,
        display: "flex", alignItems: "center", gap: 6, cursor: updating ? "default" : "pointer"
      }
    },
      e('span', { style: { display: "inline-block", animation: updating ? "spin 1s linear infinite" : "none" } }, "⟳"),
      updating ? "Actualizando…" : "Actualizar"
    ),
    e('style', null, "@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }"),
    e('div', { style: { fontSize: 72, marginBottom: 12, lineHeight: 1 } }, "🌍"),
    e('h1', { style: { color: theme.accent, fontSize: 34, fontWeight: 900, letterSpacing: "-1px", marginBottom: 6, textAlign: "center" } }, "FLAG RUSH"),
    e('p', { style: { color: theme.faint, fontSize: 13, marginBottom: 32, textAlign: "center" } }, `${COUNTRIES.length} países · 3 banderas · 5 segundos`),
    e('div', { style: { background: theme.surface, borderRadius: 16, padding: "18px 26px", marginBottom: 32, width: "100%", maxWidth: 300 } },
      ...[["⚡ 1 seg","5 pts"],["🔥 2 seg","4 pts"],["✅ 3 seg","3 pts"],["⏳ 4 seg","2 pts"],["🐢 5 seg","1 pt"]].map(([l,p]) =>
        e('div', { key: l, style: { display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${theme.border}`, color: theme.dim, fontSize: 14 } },
          e('span', null, l), e('span', { style: { color: theme.gold, fontWeight: 700 } }, p)
        )
      ),
      e('div', { style: { marginTop: 10, color: theme.red, fontSize: 12, textAlign: "center" } }, "❌ Error o tiempo = Game Over")
    ),
    e('input', {
      type: "text",
      value: playerName,
      onChange: ev => {
        const v = ev.target.value.slice(0, 20);
        setPlayerName(v);
        savePlayerName(v);
      },
      placeholder: "Nombre",
      maxLength: 20,
      style: {
        background: theme.surface, border: `1px solid ${theme.border}`, color: theme.text, borderRadius: 12,
        padding: "12px 18px", fontSize: 15, marginBottom: 18, width: "100%", maxWidth: 300,
        textAlign: "center", outline: "none", fontFamily: FONT
      }
    }),
    e('div', { style: { display: "flex", gap: 12, width: "100%", maxWidth: 300 } },
      e('button', { onClick: startGame, style: rowBtn }, "Jugar"),
      e('button', { onClick: () => setPhase("ranking"), style: rowBtn }, "Ranking")
    ),
    e(ThemeToggle, { themeMode, onToggle: toggleTheme, theme })
  );

  if (phase === "ranking") return e('div', { style: { ...center, background: theme.bg, minHeight: "100dvh", fontFamily: FONT, padding: "24px" } },
    e('div', { style: { fontSize: 48, marginBottom: 6 } }, "🏆"),
    e('h2', { style: { color: theme.text, fontSize: 22, fontWeight: 800, marginBottom: 18 } }, "Ranking"),
    e('div', { style: { background: theme.surface, borderRadius: 12, padding: "10px 18px", width: "100%", maxWidth: 320, maxHeight: 320, overflowY: "auto", marginBottom: 24 } },
      e(RankingPanel, { list: ranking, currentEntryId: null, theme })
    ),
    e('button', { onClick: () => setPhase("start"), style: { background: theme.accent, color: theme.accentText, border: "none", borderRadius: 12, padding: "13px 44px", fontSize: 16, fontWeight: 900, cursor: "pointer", fontFamily: FONT } }, "VOLVER")
  );

  if (phase === "ready") return e('div', { style: { ...center, background: theme.bg, minHeight: "100dvh", fontFamily: FONT } },
    e('div', { style: { color: theme.green, fontSize: 80, fontWeight: 900, lineHeight: 1 } }, "✓"),
    e('div', { style: { color: theme.accent, fontSize: 26, fontWeight: 800, marginTop: 14 } }, `+${pointsEarned} pts`),
    e('div', { style: { color: theme.faint, fontSize: 14, marginTop: 10 } }, "siguiente en un momento…")
  );

  if (phase === "gameover") {
    const rank = score >= 150 ? "🏆 Leyenda" : score >= 80 ? "🥇 Experto" : score >= 40 ? "🥈 Viajero" : "🥉 Principiante";
    return e('div', { style: { ...center, background: theme.bg, minHeight: "100dvh", fontFamily: FONT, padding: "24px" } },
      e('div', { style: { fontSize: 56, marginBottom: 6 } }, rank.split(" ")[0]),
      e('h2', { style: { color: theme.text, fontSize: 24, fontWeight: 800, marginBottom: 4 } }, "Game Over"),
      e('div', { style: { color: theme.gold, fontSize: 52, fontWeight: 900, lineHeight: 1, marginBottom: 4 } }, score),
      e('div', { style: { color: theme.faint, fontSize: 13, marginBottom: 10 } }, `${rank.split(" ").slice(1).join(" ")} · ${history.filter(h => h.result === "✓").length} acertadas`),
      round && feedback !== "correct" && e('div', { style: { color: theme.dim, fontSize: 13, marginBottom: 20, textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 } },
        "Era ", e('strong', { style: { color: theme.text } }, round.correct.name),
        e(FlagImg, { code: round.correct.code, style: { width: 24, height: "auto", borderRadius: 3 } })
      ),
      e('div', { style: { background: theme.surface, borderRadius: 12, padding: "10px 18px", width: "100%", maxWidth: 320, maxHeight: 220, overflowY: "auto", marginBottom: 16 } },
        e('div', { style: { ...LABEL, color: theme.faint, marginBottom: 8, textAlign: "center" } }, "Ranking"),
        e(RankingPanel, { list: ranking, currentEntryId: lastEntryId, theme })
      ),
      history.length > 0 && e('div', { style: { background: theme.surface, borderRadius: 12, padding: "10px 18px", width: "100%", maxWidth: 320, maxHeight: 200, overflowY: "auto", marginBottom: 24 } },
        ...[...history].reverse().map((h, i) =>
          e('div', { key: i, style: { display: "flex", alignItems: "center", gap: 8, padding: "4px 0", borderBottom: `1px solid ${theme.border}`, fontSize: 13 } },
            e(FlagImg, { code: h.code, style: { width: 26, height: "auto", borderRadius: 3 } }),
            e('span', { style: { color: theme.dim, flex: 1, fontSize: 12 } }, h.name),
            e('span', { style: { color: h.result === "✓" ? theme.green : theme.red, fontWeight: 700 } }, h.result),
            e('span', { style: { color: theme.gold, fontWeight: 700, minWidth: 28, textAlign: "right", fontSize: 12 } }, h.pts > 0 ? `+${h.pts}` : "")
          )
        )
      ),
      e('div', { style: { display: "flex", gap: 12, width: "100%", maxWidth: 320 } },
        e('button', { onClick: startGame, style: rowBtn }, "Jugar"),
        e('button', { onClick: () => setPhase("start"), style: rowBtn }, "Inicio")
      )
    );
  }

  if (!round) return null;

  const flashBg = feedback === "correct" ? "rgba(34,197,94,0.12)" : feedback ? "rgba(239,68,68,0.12)" : theme.bg;

  return e('div', { style: { background: flashBg, minHeight: "100dvh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between", fontFamily: FONT, padding: "env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 28px)", userSelect: "none", transition: "background 0.2s" } },
    // Header
    e('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", maxWidth: 400, paddingTop: 8 } },
      e('div', null,
        e('div', { style: { ...LABEL, color: theme.dim } }, "Pregunta"),
        e('div', { style: { color: theme.text, fontSize: 24, fontWeight: 900 } }, `#${question}`)
      ),
      e(TimerArc, { timeLeft, theme }),
      e('div', { style: { textAlign: "right" } },
        e('div', { style: { ...LABEL, color: theme.dim } }, "Puntos"),
        e('div', { style: { color: theme.gold, fontSize: 24, fontWeight: 900 } }, score)
      )
    ),
    // Country name
    e('div', { style: { textAlign: "center", padding: "0 16px" } },
      e('div', { style: { ...LABEL, color: theme.faint, marginBottom: 8 } }, "¿Cuál es la bandera de…?"),
      e('div', { style: { color: theme.text, fontSize: 38, fontWeight: 900, letterSpacing: "-0.5px", lineHeight: 1.2 } }, round.correct.name)
    ),
    // Feedback pill
    e('div', { style: { height: 36, display: "flex", alignItems: "center", justifyContent: "center" } },
      feedback === "correct" && e('div', { style: { background: "#14532d", color: theme.green, borderRadius: 20, padding: "6px 20px", fontSize: 16, fontWeight: 800, fontFamily: FONT } }, `+${pointsEarned} pts ✓`),
      feedback === "wrong" && e('div', { style: { background: "#7f1d1d", color: theme.red, borderRadius: 20, padding: "6px 20px", fontSize: 16, fontWeight: 800, fontFamily: FONT } }, "✗ Incorrecto"),
      feedback === "timeout" && e('div', { style: { background: "#1e1b4b", color: "#818cf8", borderRadius: 20, padding: "6px 20px", fontSize: 16, fontWeight: 800, fontFamily: FONT } }, "⏱ Tiempo agotado")
    ),
    // Flags
    e('div', { style: { display: "flex", flexDirection: "column", gap: 8, alignItems: "center", width: "100%" } },
      ...round.options.map((opt, idx) => {
        const isSelected = idx === selected;
        const isCorrectOpt = opt.code === round.correct.code;
        let ring = "none";
        if (feedback && isCorrectOpt) ring = `0 0 0 5px ${theme.green}`;
        else if (feedback && isSelected && !isCorrectOpt) ring = `0 0 0 5px ${theme.red}`;
        return e('button', {
          key: opt.code,
          onClick: () => handleSelect(idx),
          style: { background: "none", border: "none", padding: 0, cursor: feedback ? "default" : "pointer", borderRadius: 10, boxShadow: ring, transition: "box-shadow 0.15s, transform 0.1s", transform: isSelected && feedback ? "scale(1.06)" : "scale(1)", outline: "none", lineHeight: 1 }
        }, e(FlagImg, { code: opt.code, style: { width: "clamp(180px, 56vw, 260px)", height: "auto", borderRadius: 10, boxShadow: "0 2px 10px rgba(0,0,0,0.35)" } }));
      })
    ),
    e('div', { style: { height: 8 } })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(FlagGame));

// Service Worker para offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
